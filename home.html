<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker | Home</title>
  <!-- tailwind & daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- box icon -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- custom css -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-base-200 min-h-screen">


<section class="bg-white shadow py-3">
  <header class="flex justify-between items-center w-[90%] mx-auto">
    <div class="logo flex items-center gap-1">
      <img class="w-[30px]" src="./assets/github-logo.png">
      <h2 class="text-[16px] font-semibold">GitHub Issues Tracker</h2>
    </div>

    <div class="search-input">
      
      <div class="join">
        <div>
          <label class="input validator join-item">
            <input id="search-input" type="text" placeholder="Search Issue..." required />
          </label>
          
        </div>
        <button id="search-btn" class="btn btn-primary text-white join-item"> <i class='bx bx-plus'></i> New Issue</button>
      </div>
    
    </div>

  </header>
</section>

<section>
  <nav class="bg-white mt-12 w-[80%] mx-auto p-4 rounded-sm shadow">
    <button class="filter-btn btn w-[100px] bg-blue-600 text-white text-[12px]" data-status="all">All</button>
    <button class="filter-btn btn w-[100px] text-[12px]" data-status="open">Open</button>
    <button class="filter-btn btn w-[100px] text-[12px]" data-status="closed">Closed</button>
  </nav>
</section>

<section class="w-[80%] mx-auto rounded-md bg-white">
  <div class="flex justify-between items-center p-4 mt-3 border-b border-gray-200 ">
    <div class="flex items-center gap-1">
      <div class="w-10 h-10 bg-blue-100 flex justify-center items-center rounded-full">
        <img class="w-[26px]" src="./assets/Aperture.png">
      </div>
      <div>
        <h2 class="font-semibold"> <span id="total-issues">0</span> Issues</h2>
        <p class="text-[12px] text-gray-500">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-green-600 rounded-full"></span>
      <p class="text-[13px] text-green-600">Open</p>
      <span class="w-2 h-2 bg-purple-600 rounded-full ml-2"></span>
      <p class="text-[13px] text-purple-600 ">Closed</p>
    </div>
  </div>
  
  
  <main class="bg-gray-100 p-4">
    <div id="box-container" class="grid grid-cols-4 gap-5">
      
    </div>
    
  </main>
</section>

<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="box_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="box-details">
      
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn bg-blue-600 text-white outline-none">Close</button>
      </form>
    </div>
  </div>
</dialog>










  











  <!-- custom js -->
  <script src="./js/home.js"></script>
</body>

</html>
