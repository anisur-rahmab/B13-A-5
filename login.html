<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker | Login</title>
  <!-- tailwind & daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- custom css -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-base-200 min-h-screen flex justify-center items-center">







  <section class="min-h-[600px] w-[390px] card body-card shadow-md bg-white py-7 px-6">

    <div class="text-center mb-4">
      <div class="logo w-[80px] mx-auto mb-3">
        <img src="./assets/github-logo.png">
      </div>
      <h2 class="font-semibold text-[18px]">GitHub Issues Tracker</h2>
      <p class="text-[12px] text-[#555] font-normal">Sign in to manage your issues</p>
    </div>

    <div class="card bg-base-100 w-full">
      <div>
        <fieldset class="fieldset">
          <label class="label text-neutral">Username</label>
          <input id="username-input" value="admin" type="text" class="input w-full outline-none"
            placeholder="Enter Username" />
          <p class="text-primary">Default: admin</p>
          <label class="label text-neutral">Password</label>
          <input id="password-input" type="password" class="input w-full outline-none" placeholder="Enter Password" />
          <p class="text-primary">Default: admin123</p>
          <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
    </div>

    <div class="flex items-center justify-center gap-1 mt-4">
      <hr class="w-[45%] border-t border-gray-200">
      <h4 class="text-[12px] text-neutral">OR</h4>
      <hr class="w-[45%] border-t border-gray-200">
    </div>

    <div class="text-center">
      <p class="my-2 text-[12px] text-[#777]">Demo Credentials:</p>
      <div class="bg-base-200 py-5 rounded-sm">
        <p class="text-[12px]"><span class="font-bold">Username:</span> admin</p>
        <p class="text-[12px]"><span class="font-bold">Password:</span> admin123</p>
      </div>
    </div>

  </section>

















  <!-- custom js -->
  <script src="./js/login.js"></script>
</body>

</html>
